<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive Idiom Search</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="search-container">
        <input type="text" id="search-input" placeholder="Search by name, hanja, or meaning">
    </div>
    <div id="idiom-list">
        <!-- Dynamically filled with idiom items -->
    </div>
    <div id="modal" style="display:none;">
        <div id="modal-content">
            <span id="close-btn">&times;</span>
            <h2>Idiom Details</h2>
            <p id="idiom-meaning"></p>
        </div>
    </div>
    <script>
        const idioms = [
            // Example idiom data
            { id: 1, name: 'A penny for your thoughts', hanja: '一文钱', meaning: 'A way of asking what someone is thinking.' },
            { id: 2, name: 'Break the ice', hanja: '破冰', meaning: 'To initiate conversation in a social setting.' },
            { id: 3, name: 'Bite the bullet', hanja: '咬子弹', meaning: 'To endure a painful experience.' },
            // Add more idioms as necessary
        ];

        $(document).ready(function () {
            function renderIdioms(filteredIdioms) {
                $('#idiom-list').empty();
                filteredIdioms.forEach(idiom => {
                    $('#idiom-list').append(`<div class='idiom-item' data-id='${idiom.id}'>${idiom.name}</div>`);
                });
            }

            function filterIdioms(query) {
                const filtered = idioms.filter(idiom => 
                    idiom.name.toLowerCase().includes(query.toLowerCase()) || 
                    idiom.hanja.toLowerCase().includes(query.toLowerCase()) || 
                    idiom.meaning.toLowerCase().includes(query.toLowerCase())
                );
                renderIdioms(filtered);
            }

            $('#search-input').on('input', function () {
                const query = $(this).val();
                filterIdioms(query);
            });

            $(document).on('click', '.idiom-item', function () {
                const id = $(this).data('id');
                const idiom = idioms.find(i => i.id === id);
                $('#idiom-meaning').text(idiom.meaning);
                $('#modal').show();
            });

            $('#close-btn').on('click', function () {
                $('#modal').hide();
            });

            // Initial render
            renderIdioms(idioms);
        });
    </script>
</body>
</html>
